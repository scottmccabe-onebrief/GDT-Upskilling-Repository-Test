<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Training Roadmap Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9f9f8; color: #1a1a1a; }
  .ci { transition: opacity .22s ease, transform .22s ease; }
  .ci.fo { opacity: 0 !important; transform: translateY(4px); }
  .ci.hd { display: none; }
  input, select, textarea, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbw-eV9yDmJMsUbJEjJP8vo0n1K7osgXMpqMJeVuptzMl_VDA0xf3460zLmvThHuFmcs/exec";

const SEQ_COLORS = [
  {bg:"#FFF3E0",border:"#E8A820",text:"#7A4F00"},
  {bg:"#E8F5E9",border:"#43A047",text:"#1B5E20"},
  {bg:"#E3F2FD",border:"#1E88E5",text:"#0D47A1"},
  {bg:"#F3E5F5",border:"#9C27B0",text:"#4A148C"},
  {bg:"#FCE4EC",border:"#E91E63",text:"#880E4F"},
  {bg:"#E0F7FA",border:"#00ACC1",text:"#006064"},
  {bg:"#FFF8E1",border:"#FFB300",text:"#6D4C00"},
  {bg:"#F1F8E9",border:"#7CB342",text:"#33691E"},
  {bg:"#EDE7F6",border:"#7E57C2",text:"#311B92"},
  {bg:"#FBE9E7",border:"#FF5722",text:"#BF360C"},
];

const CRIT = {
  "0":{label:"Business critical",bg:"#FAECE7",color:"#993C1D"},
  "1":{label:"Medium",bg:"#E3F2FD",color:"#185FA5"},
  "2":{label:"Low",bg:"#F1EFE8",color:"#5F5E5A"},
};

const COL_TINTS = [
  "rgba(99,120,255,0.04)","rgba(16,180,120,0.04)",
  "rgba(255,160,40,0.04)","rgba(200,80,200,0.04)",
  "rgba(255,80,80,0.04)","rgba(0,180,180,0.04)",
];

const BLANK = {code:"",topic:"",lead:"",crit:"",category:"",pre1:"",pre2:"",suc1:"",suc2:"",date:"",desc:"",poi:""};

function mapRow(r) {
  return {
    code: r["Session Code"]||"",
    topic: r["Topic"]||"",
    lead: r["Suggested Lead"]||"",
    crit: r["Criticality"]||"",
    category: (r["Category"]||r["Category "]||"").trim(),
    pre1: r["Predecessor -2"]||"",
    pre2: r["Predecessor -1"]||"",
    suc1: r["Successor 1"]||"",
    suc2: r["Successor 2"]||"",
    date: r["Date"]||"",
    desc: r["Description"]||"",
    poi: r["POI (Program of Instruction)"]||"",
  };
}

// Dynamically build sequence chains from predecessor/successor fields
function buildChains(sessions) {
  const byCode = {};
  sessions.forEach(s => byCode[s.code] = s);

  // Find all root nodes (no predecessors) that have successors
  const visited = new Set();
  const chains = [];

  function traceChain(startCode) {
    const chain = [];
    let code = startCode;
    const seen = new Set();
    while (code && byCode[code] && !seen.has(code)) {
      seen.add(code);
      chain.push(code);
      const s = byCode[code];
      code = s.suc1 || s.suc2 || null;
    }
    return chain;
  }

  // Find all sessions that have predecessors or successors
  const seqSessions = sessions.filter(s => s.pre1 || s.pre2 || s.suc1 || s.suc2);

  // Find root of each chain (no predecessor pointing to them, or their predecessor isn't in dataset)
  seqSessions.forEach(s => {
    const hasPred = (s.pre1 && byCode[s.pre1]) || (s.pre2 && byCode[s.pre2]);
    if (!hasPred) {
      const chain = traceChain(s.code);
      if (chain.length > 1) {
        const key = chain.join(",");
        if (!visited.has(key)) {
          visited.add(key);
          chains.push(chain);
        }
      }
    }
  });

  // Also handle sessions that may be mid-chain roots
  seqSessions.forEach(s => {
    if (!chains.some(c => c.includes(s.code))) {
      const chain = traceChain(s.code);
      if (chain.length > 1) {
        const key = [...chain].sort().join(",");
        if (!visited.has(key)) {
          visited.add(key);
          chains.push(chain);
        }
      }
    }
  });

  return chains;
}

function buildCodeToGroup(chains) {
  const m = {};
  chains.forEach((chain, i) => {
    chain.forEach(code => { if (!(code in m)) m[code] = i; });
  });
  return m;
}

function getChainForCode(code, chains) {
  const matches = chains.filter(c => c.includes(code));
  if (!matches.length) return [];
  return matches.reduce((a, b) => b.length > a.length ? b : a, matches[0]);
}

function fmtDate(d) {
  if (!d) return "";
  try { return new Date(d + "T00:00:00").toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"}); }
  catch { return d; }
}

function App() {
  const [sessions, setSessions] = useState([]);
  const [sync, setSync] = useState("idle");
  const [sel, setSel] = useState(null);
  const [q, setQ] = useState("");
  const [critF, setCritF] = useState("all");
  const [seqF, setSeqF] = useState("all");
  const [panel, setPanel] = useState(null);
  const [mode, setMode] = useState("view");
  const [eForm, setEForm] = useState(null);
  const [addCat, setAddCat] = useState(null);
  const [aForm, setAForm] = useState(BLANK);
  const [saving, setSaving] = useState(false);
  const [vis, setVis] = useState(new Set());
  const [fading, setFading] = useState(new Set());
  const [lines, setLines] = useState([]);
  const [bSize, setBSize] = useState({w:900,h:700});
  const boardRef = useRef(null);
  const cRefs = useRef({});

  // Derived
  const chains = useMemo(() => buildChains(sessions), [sessions]);
  const codeToGroup = useMemo(() => buildCodeToGroup(chains), [chains]);
  const byCode = useMemo(() => { const m={}; sessions.forEach(s=>m[s.code]=s); return m; }, [sessions]);
  const categories = useMemo(() => [...new Set(sessions.map(s=>s.category).filter(Boolean))], [sessions]);

  function loadData() {
    setSync("loading");
    fetch(WEBAPP_URL + "?t=" + Date.now())
      .then(r => r.json())
      .then(j => {
        if (j.status === "ok" && j.data?.length) {
          const mapped = j.data.map(mapRow).filter(r => r.code && r.topic);
          setSessions(mapped);
          setVis(new Set(mapped.map(s => s.code)));
          setSync("ok");
        } else setSync("error");
      }).catch(() => setSync("error"));
  }

  useEffect(() => { loadData(); }, []);

  useEffect(() => {
    const el = boardRef.current; if (!el) return;
    const ro = new ResizeObserver(() => setBSize({w:el.scrollWidth,h:el.scrollHeight}));
    ro.observe(el); return () => ro.disconnect();
  }, []);

  const filtered = useMemo(() => {
    const lq = q.toLowerCase();
    return new Set(sessions.filter(s => {
      const mQ = !lq || s.topic.toLowerCase().includes(lq) || s.code.includes(lq) || s.lead.toLowerCase().includes(lq);
      const mC = critF === "all" || s.crit === critF;
      const isSeq = codeToGroup[s.code] !== undefined;
      const mS = seqF === "all" || (seqF === "sequenced" && isSeq) || (seqF === "standalone" && !isSeq);
      return mQ && mC && mS;
    }).map(s => s.code));
  }, [sessions, q, critF, seqF, codeToGroup]);

  useEffect(() => {
    const toHide = [...vis].filter(c => !filtered.has(c));
    const allOk = [...filtered].every(c => vis.has(c));
    if (!toHide.length && allOk) return;
    setFading(new Set(toHide));
    const t = setTimeout(() => { setVis(new Set(filtered)); setFading(new Set()); }, 220);
    return () => clearTimeout(t);
  }, [filtered]);

  function computeLines(code) {
    if (!boardRef.current) { setLines([]); return; }
    const chain = getChainForCode(code, chains);
    if (chain.length < 2) { setLines([]); return; }
    const br = boardRef.current.getBoundingClientRect();
    const pts = chain.map(c => {
      const el = cRefs.current[c]; if (!el) return null;
      const r = el.getBoundingClientRect();
      return {cx:r.left-br.left+r.width/2, cy:r.top-br.top+r.height/2,
              left:r.left-br.left, right:r.right-br.left,
              top:r.top-br.top, bottom:r.bottom-br.top};
    }).filter(Boolean);
    const segs = [];
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i], b = pts[i+1];
      let x1,y1,x2,y2;
      if (Math.abs(a.cx-b.cx) > 40) { x1=a.right; y1=a.cy; x2=b.left; y2=b.cy; }
      else { x1=a.cx; y1=a.bottom; x2=b.cx; y2=b.top; }
      segs.push({x1,y1,x2,y2});
    }
    setLines(segs);
  }

  function openCard(code) {
    setSel(code); setPanel(code); setMode("view"); setEForm(null);
    setTimeout(() => computeLines(code), 80);
  }
  function closeCard() { setSel(null); setPanel(null); setMode("view"); setLines([]); }

  async function doSync(action, row) {
    const sr = {
      "Session Code": row.code, "Topic": row.topic, "Suggested Lead": row.lead,
      "Criticality": row.crit, "Category ": row.category,
      "Date": row.date||"",
      "Predecessor -2": row.pre1||"", "Predecessor -1": row.pre2||"",
      "Successor 1": row.suc1||"", "Successor 2": row.suc2||"",
      "Description": row.desc, "POI (Program of Instruction)": row.poi||"",
    };
    const r = await fetch(WEBAPP_URL, {method:"POST", body:JSON.stringify({action, row:sr})});
    return r.json();
  }

  async function saveEdit() {
    setSaving(true);
    const updated = sessions.map(s => s.code === eForm.code ? eForm : s);
    setSessions(updated);
    try { await doSync("update", eForm); } catch {}
    setSaving(false); setMode("view");
  }

  async function saveAdd() {
    if (!aForm.topic.trim() || !aForm.code.trim()) return;
    setSaving(true);
    const newS = {...aForm};
    setSessions(prev => [...prev, newS]);
    setVis(prev => new Set([...prev, newS.code]));
    try { await doSync("create", newS); } catch {}
    setSaving(false); setAddCat(null);
  }

  const panelSess = panel ? byCode[panel] : null;
  const panelChain = panel ? getChainForCode(panel, chains) : [];
  const chainSet = new Set(panelChain);
  const panelGi = panel != null ? codeToGroup[panel] : undefined;
  const panelSc = panelGi !== undefined ? SEQ_COLORS[panelGi % SEQ_COLORS.length] : null;
  const selIsSeq = panel ? codeToGroup[panel] !== undefined : false;

  const inp = {width:"100%",padding:"5px 8px",fontSize:12,border:"0.5px solid #d0d0cc",borderRadius:6,background:"#fff",color:"#1a1a1a",marginTop:3,boxSizing:"border-box"};
  const lbl = {fontSize:10,fontWeight:500,color:"#888880",textTransform:"uppercase",letterSpacing:".05em",display:"block",marginTop:10};

  function FBtn({active, onClick, children}) {
    return <button onClick={onClick} style={{padding:"5px 12px",fontSize:12,border:"0.5px solid #d0d0cc",borderRadius:20,cursor:"pointer",fontWeight:active?500:400,background:active?"#e8e8e5":"#fff",color:active?"#1a1a1a":"#4a4a4a",transition:"background .15s"}}>{children}</button>;
  }

  const formFields = [
    ["Topic","topic","text"],["Lead","lead","text"],["Date","date","date"],
    ["Description","desc","textarea"],
    ["Predecessor -2 (session code)","pre1","text"],
    ["Predecessor -1 (session code)","pre2","text"],
    ["Successor 1 (session code)","suc1","text"],
    ["Successor 2 (session code)","suc2","text"],
  ];

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",padding:"1.5rem 2rem 2rem 96px",minHeight:"100vh"}}>

      {/* Sync status */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:sync==="ok"?"#43A047":sync==="error"?"#E24B4A":sync==="loading"?"#FFB300":"#aaa"}}/>
        <span style={{fontSize:11,color:"#888880"}}>
          {sync==="ok"?"Synced with Google Sheets":sync==="loading"?"Connecting to Google Sheets…":sync==="error"?"Using local data (sheet unreachable)":"Initializing…"}
        </span>
        {sync==="error" && <button onClick={loadData} style={{fontSize:11,padding:"2px 8px",border:"0.5px solid #d0d0cc",borderRadius:6,cursor:"pointer",background:"none",color:"#4a4a4a"}}>Retry</button>}
      </div>

      {/* Filter bar */}
      <div style={{background:"#f3f3f1",border:"0.5px solid #e5e5e2",borderRadius:10,padding:"12px 16px",marginBottom:22}}>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Search sessions, leads, keywords…"
          style={{width:"100%",padding:"7px 12px",fontSize:13,border:"0.5px solid #d0d0cc",borderRadius:20,background:"#fff",color:"#1a1a1a",boxSizing:"border-box",marginBottom:12}}/>
        <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,fontWeight:500,color:"#4a4a4a"}}>Priority</span>
            {[["all","All"],["0","🔴 Business Critical"],["1","🔵 Medium"],["2","⚪ Low"]].map(([v,l])=>
              <FBtn key={v} active={critF===v} onClick={()=>setCritF(v)}>{l}</FBtn>)}
          </div>
          <div style={{width:1,height:22,background:"#e5e5e2"}}/>
          <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:36}}>
            <span style={{fontSize:11,fontWeight:500,color:"#4a4a4a"}}>Sequence</span>
            {[["all","All"],["sequenced","⇄ Sequenced"],["standalone","Standalone"]].map(([v,l])=>
              <FBtn key={v} active={seqF===v} onClick={()=>setSeqF(v)}>{l}</FBtn>)}
          </div>
        </div>
      </div>

      {/* Board + panel */}
      <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
        <div ref={boardRef} style={{position:"relative",flex:1,minWidth:0}}>

          {/* SVG lines */}
          {lines.length > 0 && (
            <svg style={{position:"absolute",top:0,left:0,width:bSize.w,height:bSize.h,pointerEvents:"none",zIndex:10,overflow:"visible"}}>
              <defs>
                <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                  <polygon points="0 0,8 3,0 6" fill="#60B4FF" opacity="0.85"/>
                </marker>
                <filter id="glow">
                  <feGaussianBlur stdDeviation="3" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              {lines.map((l,i) => {
                const dx=l.x2-l.x1, dy=l.y2-l.y1, h=Math.abs(dx)>Math.abs(dy);
                const d=`M${l.x1},${l.y1} C${h?l.x1+dx*.5:l.x1},${h?l.y1:l.y1+dy*.4} ${h?l.x2-dx*.1:l.x2},${h?l.y2:l.y2-dy*.1} ${l.x2},${l.y2}`;
                return <g key={i} filter="url(#glow)">
                  <path d={d} fill="none" stroke="rgba(96,180,255,0.2)" strokeWidth="7"/>
                  <path d={d} fill="none" stroke="#60B4FF" strokeWidth="1.8" strokeDasharray="5,3" markerEnd="url(#arr)" opacity="0.85"/>
                </g>;
              })}
            </svg>
          )}

          {/* Columns */}
          <div style={{display:"flex",gap:14,overflowX:"auto",alignItems:"flex-start",paddingBottom:12}}>
            {categories.map((cat,ci) => {
              const catS = sessions.filter(s => s.category === cat);
              return (
                <div key={cat} style={{minWidth:215,maxWidth:230,flexShrink:0,background:COL_TINTS[ci%COL_TINTS.length],border:"0.5px solid rgba(120,120,140,0.10)",borderRadius:12,padding:"14px 12px 12px"}}>
                  <div style={{fontSize:14,fontWeight:700,textDecoration:"underline",color:"#1a1a1a",marginBottom:12,lineHeight:1.3}}>
                    {cat}
                    <span style={{fontSize:11,fontWeight:400,color:"#888880",marginLeft:7,textDecoration:"none"}}>{catS.filter(s=>vis.has(s.code)||fading.has(s.code)).length}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    {catS.map(s => {
                      const gi = codeToGroup[s.code];
                      const sc = gi !== undefined ? SEQ_COLORS[gi % SEQ_COLORS.length] : null;
                      const cc = CRIT[s.crit];
                      const isSel = sel === s.code;
                      const inChain = panel && chainSet.has(s.code) && !isSel;
                      const dimmed = sel && !isSel && !inChain;
                      const isFo = fading.has(s.code);
                      const isHd = !vis.has(s.code) && !isFo;

                      let bg = sc ? sc.bg : "#fff";
                      let border = "0.5px solid #e5e5e2";
                      let shadow = "none";
                      let opacity = 1;
                      if (isSel) { bg="#fff"; border="2px solid #FFD700"; shadow="0 0 0 2px #FFD700,0 0 14px 5px rgba(255,215,0,0.5)"; opacity=0.85; }
                      else if (inChain && selIsSeq) { bg="#EBF6FF"; border="1.5px solid #60B4FF"; shadow="0 0 0 1.5px #60B4FF,0 0 12px 4px rgba(96,180,255,0.35)"; }
                      else if (dimmed) { opacity=0.38; }

                      return (
                        <div key={s.code}
                          ref={el => { cRefs.current[s.code] = el; }}
                          className={`ci${isFo?" fo":""}${isHd?" hd":""}`}
                          onClick={() => isSel ? closeCard() : openCard(s.code)}
                          style={{borderRadius:8,border,padding:"9px 11px",cursor:"pointer",background:bg,opacity,boxShadow:shadow,transition:"opacity .22s ease,transform .22s ease,box-shadow .2s ease",position:"relative",zIndex:isSel||inChain?5:1}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3,gap:4}}>
                            <span style={{fontSize:10,color:"#888880",fontWeight:500}}>#{s.code}</span>
                            {cc && <span style={{fontSize:10,padding:"1px 5px",borderRadius:10,background:cc.bg,color:cc.color,whiteSpace:"nowrap",fontWeight:500}}>{cc.label}</span>}
                          </div>
                          <div style={{fontSize:12,fontWeight:500,color:"#1a1a1a",lineHeight:1.35,marginBottom:3}}>{s.topic}</div>
                          {s.lead && <div style={{fontSize:11,color:"#888880",marginBottom:3}}>{s.lead}</div>}
                          {s.date && <div style={{fontSize:10,color:"#888880",marginBottom:3}}>📅 {fmtDate(s.date)}</div>}
                          {sc
                            ? <div style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,padding:"2px 6px",borderRadius:10,background:`${sc.border}22`,color:sc.text,fontWeight:500}}>⇄ Sequenced</div>
                            : <div style={{fontSize:10,color:"#888880",fontStyle:"italic"}}>Standalone</div>}
                        </div>
                      );
                    })}
                  </div>
                  <button onClick={() => { setAForm({...BLANK,category:cat}); setAddCat(cat); }}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#aaa";e.currentTarget.style.color="#4a4a4a";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#d0d0cc";e.currentTarget.style.color="#888880";}}
                    style={{marginTop:12,width:"100%",padding:"7px 0",fontSize:12,border:"1.5px solid #d0d0cc",borderRadius:20,cursor:"pointer",background:"none",color:"#888880",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                    <span style={{fontSize:16,lineHeight:1}}>+</span> Add session
                  </button>
                </div>
              );
            })}
          </div>
        </div>

        {/* Detail / Edit panel */}
        {panelSess && (
          <div style={{width:295,flexShrink:0,background:"rgba(255,255,255,0.97)",border:"0.5px solid #d0d0cc",borderRadius:12,padding:"1.2rem",maxHeight:"80vh",overflowY:"auto",position:"sticky",top:24,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
            <button onClick={closeCard} style={{float:"right",background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#888880"}}>✕</button>
            <div style={{fontSize:11,color:"#888880",marginBottom:4}}>#{panelSess.code} · {panelSess.category}</div>
            {mode==="view" ? (
              <>
                <h2 style={{fontSize:15,fontWeight:500,lineHeight:1.35,marginBottom:8,paddingRight:20,color:"#1a1a1a"}}>{panelSess.topic}</h2>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                  {CRIT[panelSess.crit] && <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:CRIT[panelSess.crit].bg,color:CRIT[panelSess.crit].color,fontWeight:500}}>{CRIT[panelSess.crit].label}</span>}
                  {panelSess.date && <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:"#F1F5F9",color:"#475569",fontWeight:500}}>📅 {fmtDate(panelSess.date)}</span>}
                </div>
                {panelSess.lead && <div style={{marginBottom:10}}><div style={{fontSize:10,fontWeight:500,color:"#888880",textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Lead</div><div style={{fontSize:13,color:"#1a1a1a"}}>{panelSess.lead}</div></div>}
                {panelSess.desc && <div style={{marginBottom:10}}><div style={{fontSize:10,fontWeight:500,color:"#888880",textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>Description</div><div style={{fontSize:13,lineHeight:1.5,color:"#1a1a1a"}}>{panelSess.desc}</div></div>}
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,fontWeight:500,color:"#888880",textTransform:"uppercase",letterSpacing:".05em",marginBottom:5}}>Training sequence</div>
                  {panelChain.length > 1 ? (
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
                      {panelChain.map((c,i) => {
                        const nd = byCode[c]; const isCur = c === panel;
                        return <span key={c} style={{display:"flex",alignItems:"center",gap:4}}>
                          {i > 0 && <span style={{color:"#888880",fontSize:11}}>→</span>}
                          <span onClick={e=>{e.stopPropagation();openCard(c);}}
                            style={{fontSize:11,padding:"3px 7px",borderRadius:6,cursor:"pointer",fontWeight:isCur?600:400,background:panelSc?panelSc.bg:"#eee",color:panelSc?panelSc.text:"#333",border:isCur?`1.5px solid ${panelSc?.border||"#aaa"}`:`0.5px solid ${(panelSc?.border||"#aaa")}88`}}>
                            #{c} {nd?.topic}
                          </span>
                        </span>;
                      })}
                    </div>
                  ) : <div style={{fontSize:12,color:"#888880",fontStyle:"italic"}}>Standalone — no prerequisites</div>}
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={() => { setEForm({...panelSess}); setMode("edit"); }} style={{padding:"6px 14px",fontSize:12,border:"0.5px solid #d0d0cc",borderRadius:8,cursor:"pointer",background:"#f3f3f1",color:"#1a1a1a"}}>Edit</button>
                  <button onClick={closeCard} style={{padding:"6px 14px",fontSize:12,border:"0.5px solid #d0d0cc",borderRadius:8,cursor:"pointer",background:"none",color:"#4a4a4a"}}>Close</button>
                </div>
              </>
            ) : (
              <>
                <h2 style={{fontSize:14,fontWeight:500,marginBottom:10,paddingRight:20,color:"#1a1a1a"}}>Editing #{eForm.code}</h2>
                {formFields.map(([l,k,t]) => (
                  <label key={k} style={lbl}>{l}
                    {t==="textarea"
                      ? <textarea value={eForm[k]||""} onChange={e=>setEForm(f=>({...f,[k]:e.target.value}))} rows={3} style={{...inp,resize:"vertical"}}/>
                      : <input type={t} value={eForm[k]||""} onChange={e=>setEForm(f=>({...f,[k]:e.target.value}))} style={inp}/>}
                  </label>
                ))}
                <label style={lbl}>Criticality
                  <select value={eForm.crit||""} onChange={e=>setEForm(f=>({...f,crit:e.target.value}))} style={inp}>
                    <option value="">— unset —</option>
                    <option value="0">Business Critical</option>
                    <option value="1">Medium</option>
                    <option value="2">Low</option>
                  </select>
                </label>
                <label style={lbl}>Category
                  <select value={eForm.category||""} onChange={e=>setEForm(f=>({...f,category:e.target.value}))} style={inp}>
                    <option value="">— select —</option>
                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </label>
                <div style={{display:"flex",gap:8,marginTop:14}}>
                  <button onClick={saveEdit} disabled={saving} style={{padding:"6px 14px",fontSize:12,border:"0.5px solid #d0d0cc",borderRadius:8,cursor:"pointer",background:"#f3f3f1",color:"#1a1a1a",opacity:saving?0.6:1}}>{saving?"Saving…":"Save & sync"}</button>
                  <button onClick={()=>setMode("view")} style={{padding:"6px 14px",fontSize:12,border:"0.5px solid #d0d0cc",borderRadius:8,cursor:"pointer",background:"none",color:"#4a4a4a"}}>Cancel</button>
                </div>
              </>
            )}
          </div>
        )}
      </div>

      {/* Add modal */}
      {addCat && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"rgba(255,255,255,0.97)",borderRadius:12,padding:"1.5rem",width:340,maxHeight:"85vh",overflowY:"auto",border:"0.5px solid #d0d0cc",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <h2 style={{fontSize:15,fontWeight:500,margin:0,color:"#1a1a1a"}}>New session</h2>
              <button onClick={()=>setAddCat(null)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#888880"}}>✕</button>
            </div>
            <div style={{fontSize:11,color:"#888880",marginBottom:10}}>Adding to: {addCat}</div>
            <label style={lbl}>Session Code *
              <input value={aForm.code} onChange={e=>setAForm(f=>({...f,code:e.target.value}))} style={inp}/>
            </label>
            {formFields.map(([l,k,t]) => (
              <label key={k} style={lbl}>{l}
                {t==="textarea"
                  ? <textarea value={aForm[k]||""} onChange={e=>setAForm(f=>({...f,[k]:e.target.value}))} rows={3} style={{...inp,resize:"vertical"}}/>
                  : <input type={t} value={aForm[k]||""} onChange={e=>setAForm(f=>({...f,[k]:e.target.value}))} style={inp}/>}
              </label>
            ))}
            <label style={lbl}>Criticality
              <select value={aForm.crit||""} onChange={e=>setAForm(f=>({...f,crit:e.target.value}))} style={inp}>
                <option value="">— unset —</option>
                <option value="0">Business Critical</option>
                <option value="1">Medium</option>
                <option value="2">Low</option>
              </select>
            </label>
            <label style={lbl}>Category
              <select value={aForm.category||""} onChange={e=>setAForm(f=>({...f,category:e.target.value}))} style={inp}>
                <option value="">— select —</option>
                {categories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </label>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={saveAdd} disabled={saving||!aForm.topic.trim()||!aForm.code.trim()}
                style={{padding:"6px 16px",fontSize:12,border:"0.5px solid #d0d0cc",borderRadius:8,cursor:"pointer",background:"#f3f3f1",color:"#1a1a1a",opacity:(saving||!aForm.topic.trim()||!aForm.code.trim())?0.5:1}}>
                {saving?"Saving…":"Add & sync"}
              </button>
              <button onClick={()=>setAddCat(null)} style={{padding:"6px 14px",fontSize:12,border:"0.5px solid #d0d0cc",borderRadius:8,cursor:"pointer",background:"none",color:"#4a4a4a"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
